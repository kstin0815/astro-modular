allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
minimumReleaseAgeExclude:
  # Name-only patterns: an exact name@version misses astro's peer-suffixed
  # lockfile key, so the exemption silently fails. Bare names match reliably.
  - astro
  - '@astrojs/markdown-satteri'
  - '@astrojs/mdx'
  - vscode-languageserver-protocol
